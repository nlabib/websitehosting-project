<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudSev | Past Orders</title>
    <link rel="stylesheet" type="text/css" href="css/bootstrap.css" />
  </head>
  <body>
    <div class="container">
      <div class="panel panel-primary">
        <div class="panel-heading text-center">
          <h1>User Past Orders</h1>
          <p class="subtitle">Example order history displayed by the static frontend.</p>
        </div>
        <div class="panel-body">
          <div class="table-card">
            <table class="orders-table">
              <tr>
                <th>Date Ordered</th>
                <th>Invoice Number</th>
                <th>Total</th>
                <th>Delivered</th>
              </tr>
              <tr>
                <td>March 18, 2026</td>
                <td>INV-8941326685</td>
                <td>$29.97</td>
                <td><span class="badge badge-pending">No</span></td>
              </tr>
              <tr>
                <td>January 26, 2026</td>
                <td>INV-2316549152</td>
                <td>$119.97</td>
                <td><span class="badge badge-success">Yes</span></td>
              </tr>
              <tr>
                <td>November 2, 2025</td>
                <td>INV-6942326870</td>
                <td>$9.99</td>
                <td><span class="badge badge-success">Yes</span></td>
              </tr>
            </table>
          </div>

          <div class="inline-actions">
            <a class="button-link" href="HomePage.html">Return to Homepage</a>
            <a class="button-link" href="Products.html">Browse Products</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
